     troque "SEU-SITE" abaixo (nas 2 linhas) pelo endereço do seu site. -->

<style>
  :root{
    --bg:#f4f8fb;          /* branco azulado */
    --card:#ffffff;        /* branco */
    --ink:#13343f;         /* texto escuro */
    --muted:#5e7785;
    --line:#d9e7ee;
    --brand:#1c80b8;       /* azul */
    --brand-dark:#0f5c5c;  /* verde marinho */
    --wa:#25d366;          /* verde whatsapp */
    --wa-dark:#1da851;
    --tag:#e4f0f7;         /* azul bem claro */
  }
  *{box-sizing:border-box}
  body{
    margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;
  }
  header{
    background:linear-gradient(135deg,var(--brand),var(--brand-dark));
    color:#fff;padding:34px 20px 30px;text-align:center;
  }
  header h1{margin:0 0 6px;font-size:1.9rem;letter-spacing:.3px}
  header p{margin:0;opacity:.95;font-size:1rem}
  .wrap{max-width:1100px;margin:0 auto;padding:0 16px}

  /* Botão fixo "Como funciona" no canto superior direito */
  .topo-btn{position:fixed;top:14px;right:16px;z-index:25;color:#fff;text-decoration:none;font-weight:600;
    font-size:.9rem;background:var(--brand-dark);border:1px solid rgba(255,255,255,.45);
    padding:9px 16px;border-radius:999px;box-shadow:0 3px 12px rgba(0,0,0,.22);transition:.15s}
  .topo-btn:hover{background:var(--brand)}
  @media(max-width:480px){.topo-btn{font-size:.82rem;padding:8px 13px;top:10px;right:10px}}

  /* Filtros */
  .filters{
    display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
    padding:22px 16px 6px;position:sticky;top:0;background:var(--bg);
    z-index:5;border-bottom:1px solid var(--line)
  }
  .filter-btn{
    border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:8px 16px;border-radius:999px;cursor:pointer;font-size:.92rem;
    transition:.15s
  }
  .filter-btn:hover{border-color:var(--brand)}
  .filter-btn.active{background:var(--brand);color:#fff;border-color:var(--brand)}

  .search{
    display:block;margin:16px auto 4px;max-width:420px;width:100%;
    padding:11px 14px;border:1px solid var(--line);border-radius:10px;
    font-size:1rem;background:var(--card)
  }

  /* Grade de produtos */
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:18px;padding:22px 16px 60px
  }
  .card{
    background:var(--card);border:1px solid var(--line);border-radius:14px;
    overflow:hidden;display:flex;flex-direction:column;
    box-shadow:0 1px 3px rgba(0,0,0,.04);transition:.18s
  }
  .card:hover{transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
  .card .photo{
    position:relative;aspect-ratio:4/5;background:var(--tag);overflow:hidden;
    display:flex;align-items:center;justify-content:center
  }
  .card .photo.multi{cursor:grab;touch-action:pan-y}
  .card .photo.multi:active{cursor:grabbing}
  .card .photo img{width:100%;height:100%;object-fit:cover;transition:opacity .18s ease;user-select:none;-webkit-user-drag:none}
  .card .photo .placeholder{color:var(--muted);font-size:.85rem;text-align:center;padding:10px}
  .photo-count{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.55);color:#fff;
    font-size:.72rem;padding:2px 8px;border-radius:999px;pointer-events:none}
  /* setas */
  .photo .nav{position:absolute;top:50%;transform:translateY(-50%);border:none;cursor:pointer;
    width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.42);color:#fff;font-size:1.5rem;
    display:flex;align-items:center;justify-content:center;line-height:1;padding:0 0 3px;
    opacity:.5;transition:opacity .15s;z-index:2}
  .photo:hover .nav{opacity:1}
  .photo .nav-prev{left:8px}
  .photo .nav-next{right:8px}
  .dots{position:absolute;bottom:8px;left:0;right:0;display:flex;gap:6px;justify-content:center;z-index:2}
  .dots .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer;
    box-shadow:0 0 3px rgba(0,0,0,.3)}
  .dots .dot.on{background:#fff;transform:scale(1.15)}

  /* Faixa VENDIDO */
  .card.vendido .photo img{filter:grayscale(.55) brightness(.9)}
  .vendido-faixa{position:absolute;top:50%;left:-12%;width:124%;
    transform:translateY(-50%) rotate(-18deg);text-align:center;z-index:4;
    background:rgba(192,57,43,.93);color:#fff;font-weight:800;font-size:1.5rem;
    letter-spacing:4px;padding:9px 0;box-shadow:0 3px 12px rgba(0,0,0,.35);pointer-events:none}
  .add-btn.esgotado{background:#e6e1da;color:#8a8178;border-color:#ddd5cb;cursor:not-allowed}
  .add-btn.esgotado:hover{background:#e6e1da}

  /* Lightbox (foto ampliada) */
  .lb{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:50;display:none;align-items:center;justify-content:center}
  .lb.open{display:flex}
  .lb img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;cursor:zoom-in;
    transition:transform .2s;transform-origin:center}
  .lb img.zoom{cursor:zoom-out}
  .lb-close{position:fixed;top:14px;right:20px;font-size:2.6rem;line-height:1;color:#fff;background:none;
    border:none;cursor:pointer;z-index:52}
  .lb-nav{position:fixed;top:50%;transform:translateY(-50%);width:54px;height:54px;border-radius:50%;
    background:rgba(255,255,255,.18);color:#fff;border:none;font-size:2.2rem;line-height:1;cursor:pointer;
    align-items:center;justify-content:center;z-index:52}
  .lb-nav:hover{background:rgba(255,255,255,.3)}
  .lb-prev{left:14px;padding-bottom:4px}
  .lb-next{right:14px;padding-bottom:4px}
  .lb-count{position:fixed;bottom:18px;left:0;right:0;text-align:center;color:#fff;font-size:.95rem}
  .card .body{padding:14px;display:flex;flex-direction:column;gap:5px;flex:1}
  .card .name{font-weight:600;font-size:1rem}
  .card .marca{font-size:.82rem;color:var(--brand);font-weight:600}
  .card .obs{font-size:.8rem;color:var(--brand-dark);background:var(--tag);padding:3px 8px;border-radius:6px;width:fit-content}
  .card .meta{font-size:.82rem;color:var(--muted)}
  .badge{
    display:inline-block;background:var(--tag);color:var(--brand-dark);
    font-size:.72rem;padding:3px 9px;border-radius:999px;width:fit-content
  }
  .price{font-size:1.25rem;font-weight:700;color:var(--brand-dark);margin-top:auto}
  .wa-btn{
    margin-top:8px;display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--wa);color:#fff;text-decoration:none;font-weight:600;
    padding:10px;border-radius:10px;transition:.15s;font-size:.92rem
  }
  .wa-btn:hover{background:var(--wa-dark)}
  .wa-btn svg{width:18px;height:18px;fill:#fff}

  /* Botão adicionar ao carrinho */
  .add-btn{
    margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px;
    border:1px solid var(--brand);background:#fff;color:var(--brand-dark);font-weight:600;
    padding:10px;border-radius:10px;cursor:pointer;transition:.15s;font-size:.92rem;width:100%
  }
  .add-btn:hover{background:var(--tag)}
  .add-btn.in-cart{background:var(--brand);color:#fff;border-color:var(--brand)}

  /* Barra/botão flutuante do carrinho */
  .cart-fab{
    position:fixed;right:18px;bottom:18px;z-index:20;
    background:var(--wa);color:#fff;border:none;cursor:pointer;
    border-radius:999px;padding:14px 20px;font-size:1rem;font-weight:700;
    box-shadow:0 6px 18px rgba(0,0,0,.22);display:flex;align-items:center;gap:8px
  }
  .cart-fab:hover{background:var(--wa-dark)}
  .cart-count{background:#fff;color:var(--wa-dark);border-radius:999px;
    min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;
    font-size:.8rem;padding:0 6px}

  /* Painel do carrinho */
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:30;display:none}
  .overlay.open{display:block}
  .cart-panel{
    position:fixed;top:0;right:0;height:100%;width:380px;max-width:90vw;background:var(--bg);
    z-index:31;transform:translateX(100%);transition:.25s;display:flex;flex-direction:column;
    box-shadow:-4px 0 24px rgba(0,0,0,.18)
  }
  .cart-panel.open{transform:translateX(0)}
  .cart-head{padding:18px 18px 14px;border-bottom:1px solid var(--line);
    display:flex;justify-content:space-between;align-items:center}
  .cart-head h2{margin:0;font-size:1.2rem}
  .cart-close{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--muted);line-height:1}
  .cart-items{flex:1;overflow-y:auto;padding:14px 18px}
  .cart-row{display:flex;justify-content:space-between;align-items:center;gap:10px;
    padding:12px 0;border-bottom:1px solid var(--line)}
  .cart-row .info{font-size:.92rem}
  .cart-row .info small{color:var(--muted);display:block}
  .cart-row .right{display:flex;align-items:center;gap:10px;white-space:nowrap}
  .cart-row .rm{background:none;border:none;color:#c0392b;cursor:pointer;font-size:.85rem}
  .cart-foot{padding:16px 18px;border-top:1px solid var(--line);background:var(--card)}
  .cart-total{display:flex;justify-content:space-between;font-size:1.15rem;font-weight:700;margin-bottom:12px}
  .cart-foot .wa-btn{font-size:1rem;padding:13px}
  .cart-empty{text-align:center;color:var(--muted);padding:40px 16px}

  .empty{text-align:center;color:var(--muted);padding:50px 16px;grid-column:1/-1}

  footer{
    text-align:center;padding:26px 16px;color:var(--muted);font-size:.85rem;
    border-top:1px solid var(--line)
  }
  footer a{color:var(--brand-dark);text-decoration:none;font-weight:600}
</style>
</head>

<header>

<div class="wrap">

<script>
/* =====================================================================
   ✏️  COMO EDITAR ESTE SITE  (é só mexer nas 2 áreas abaixo)
   ---------------------------------------------------------------------
   1) WHATSAPP: troque o número abaixo pelo SEU (com DDD, sem espaços).
      Formato: 55 + DDD + número.  Ex.: "5573999998888"
   2) PRODUTOS: cada item fica entre chaves { ... }. Copie um bloco,
      cole abaixo e troque os dados. Para apagar um item, apague o bloco.

   Campos de cada produto:
     nome      -> nome do item
     preco     -> número, ex: 45  (sem "R$")
     categoria -> uma destas: "Feminino", "Masculino", "Infantil",
                  "Brinquedos", "Casa", "Eletrônicos"
     marca     -> opcional, ex: "Farm", "Nike" (deixe "" se não tiver)
     tamanho   -> opcional, ex: "M", "42", "2 anos" (deixe "" se não tiver)
     condicao  -> ex: "Novo", "Seminovo", "Usado - bom estado"
     fotos     -> lista de fotos entre colchetes (1 ou mais), ex:
                  ["fotos/01.jpg","fotos/01_2.jpg"]
                  (deixe []  para mostrar só um espaço cinza por enquanto)
     vendido   -> opcional. Para marcar como VENDIDO, adicione  vendido:true,
                  no item (antes de "fotos"). Aparece a faixa e o item não
                  pode mais ser comprado. Para reativar, apague esse trecho.
   ===================================================================== */

const WHATSAPP = "5513996746283";   // 👈 seu número

const PRODUTOS = [
  { nome:"Conjuntinho florido Farm (croped + saia mid)", marca:"Farm", preco:200, categoria:"Feminino", tamanho:"M", condicao:"Seminovo", vendido:true, fotos:["Fotos/01.png","Fotos/01_2.png"] },
  { nome:"Vestido florido longo", marca:"", preco:100, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", fotos:["Fotos/02_1.png","Fotos/02_2.png"] },
  { nome:"Macaquinho azul Farm", marca:"Farm", preco:50, categoria:"Feminino", tamanho:"P", condicao:"Seminovo", fotos:["Fotos/03_1.png"] },
  { nome:"Vestido verde musgo estampado", marca:"", preco:40, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", fotos:["Fotos/04_1.png","Fotos/04_2.png"] },
  { nome:"Macaquinho Oh Boy! estampado", marca:"Oh Boy!", preco:80, categoria:"Feminino", tamanho:"P", condicao:"Seminovo", fotos:["Fotos/05_1.png","Fotos/05_2.png"] },
  { nome:"Túnica indiana", marca:"Comprada na Índia", preco:50, categoria:"Feminino", tamanho:"U", condicao:"Novo", fotos:["Fotos/06_1.png"] },
  { nome:"Vestidinho curto", marca:"Ierê (Itacaré)", preco:30, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", fotos:["Fotos/07_1.png","Fotos/07_2.png"] },
  { nome:"Calça amarela", marca:"P.A. Concept", preco:80, categoria:"Feminino", tamanho:"40", condicao:"Seminovo", fotos:["Fotos/08_1.png","Fotos/08_2.png"] },
  { nome:"Calça vermelha", marca:"Shoulder", preco:100, categoria:"Feminino", tamanho:"38", condicao:"Seminovo", fotos:["Fotos/09_1.png","Fotos/09_2.png"] },
  { nome:"Maiô dupla face", marca:"Brilho do sol", preco:50, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", fotos:["Fotos/10_1.png","Fotos/10_2.png","Fotos/10_3.png"] },
  { nome:"Maiô florido", marca:"Brilho do sol", preco:50, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", fotos:["Fotos/11_1.png","Fotos/11_2.png"] },
  { nome:"Maiô verde musgo", marca:"Renner", preco:50, categoria:"Feminino", tamanho:"G", condicao:"Seminovo", obs:"Vem com quimono, de brinde", fotos:["Fotos/12_1.png","Fotos/12_2.png","Fotos/12_3.png"] },
  { nome:"Maiô manga longa", marca:"Live!", preco:60, categoria:"Feminino", tamanho:"", condicao:"Seminovo", fotos:["Fotos/13_1.png","Fotos/13_2.png"] },
  { nome:"Top paetês preto", marca:"L'etage", preco:50, categoria:"Feminino", tamanho:"P", condicao:"Seminovo", fotos:["Fotos/14_1.png","Fotos/14_2.png"] },
  { nome:"Celular Redmi", marca:"Xiaomi", preco:650, categoria:"Eletrônicos", tamanho:"", condicao:"Seminovo", obs:"Sem marcas de uso / sem carregador", fotos:["Fotos/15_1.png","Fotos/15_2.png","Fotos/15_3.png"] },
  { nome:"Aparador", marca:"", preco:100, categoria:"Casa", tamanho:"", condicao:"Usado - com marcas de uso", obs:"Sem os puxadores", fotos:["Fotos/16_1.png"] },
];

/* ====== Daqui para baixo não precisa mexer ====== */

const CATEGORIAS = ["Todos","Feminino","Masculino","Infantil","Brinquedos","Casa","Eletrônicos"];
let filtroAtivo = "Todos";
let busca = "";
PRODUTOS.forEach((p,i)=>p.id=i);   // identifica cada produto
let carrinho = [];                 // ids dos itens escolhidos

const grid = document.getElementById("grid");
const filtersEl = document.getElementById("filters");

CATEGORIAS.forEach(cat=>{
  const b=document.createElement("button");
  b.className="filter-btn"+(cat==="Todos"?" active":"");
  b.textContent=cat;
  b.onclick=()=>{filtroAtivo=cat;document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));b.classList.add("active");render();};
  filtersEl.appendChild(b);
});

document.getElementById("search").addEventListener("input",e=>{busca=e.target.value.toLowerCase();render();});

function moeda(v){return "R$ "+Number(v).toFixed(2).replace(".",",");}

function linkWhats(p){
  const txt=encodeURIComponent(`Olá! Tenho interesse no item: ${p.nome} (${moeda(p.preco)})${p.tamanho?` - tam ${p.tamanho}`:""}. Ainda está disponível?`);
  return `https://wa.me/${WHATSAPP}?text=${txt}`;
}

const WA_ICON=`<svg viewBox="0 0 24 24"><path d="M.06 24l1.68-6.13A11.86 11.86 0 010 11.86 11.93 11.93 0 0111.95 0a11.86 11.86 0 018.43 3.5 11.8 11.8 0 013.5 8.42c0 6.56-5.36 11.9-11.95 11.9a12 12 0 01-5.7-1.45L.06 24zM6.6 20.2l.36.21a9.9 9.9 0 005.04 1.38c5.45 0 9.9-4.42 9.9-9.86A9.78 9.78 0 0018.97 4.9a9.78 9.78 0 00-7.02-2.9c-5.46 0-9.9 4.43-9.9 9.87a9.8 9.8 0 001.5 5.22l.24.38-1 3.63 3.8-1zm11.5-5.3c-.07-.12-.27-.2-.57-.35s-1.76-.86-2.03-.96-.47-.15-.66.15-.76.95-.93 1.15-.34.22-.63.07a8.1 8.1 0 01-2.39-1.47 9 9 0 01-1.65-2.06c-.17-.3 0-.45.13-.6s.3-.34.44-.52a2 2 0 00.3-.5.55.55 0 00-.02-.52c-.08-.15-.66-1.6-.9-2.18-.24-.58-.48-.5-.66-.5l-.57-.01a1.1 1.1 0 00-.79.37 3.3 3.3 0 00-1.04 2.46A5.78 5.78 0 007.3 12.5a13.1 13.1 0 005.02 4.43c.7.3 1.25.48 1.68.62.7.22 1.35.19 1.86.12.57-.09 1.76-.72 2-1.42s.25-1.28.18-1.4z"/></svg>`;

function render(){
  const itens=PRODUTOS.filter(p=>{
    const okCat=filtroAtivo==="Todos"||p.categoria===filtroAtivo;
    const okBusca=!busca||(p.nome+" "+p.categoria+" "+(p.tamanho||"")).toLowerCase().includes(busca);
    return okCat&&okBusca;
  });
  grid.innerHTML="";
  if(itens.length===0){grid.innerHTML='<p class="empty">Nenhum item encontrado. 🙃</p>';return;}
  itens.forEach(p=>{
    const card=document.createElement("div");card.className="card"+(p.vendido?" vendido":"");
    const fotos=p.fotos||[];
    const idx=galeriaIdx[p.id]||0;
    let fotoHTML;
    if(fotos.length){
      const extra = fotos.length>1
        ? `<button class="nav nav-prev" aria-label="Foto anterior">‹</button>
           <button class="nav nav-next" aria-label="Próxima foto">›</button>
           <span class="photo-count">${idx+1}/${fotos.length}</span>
           <div class="dots">${fotos.map((_,k)=>`<span class="dot${k===idx?" on":""}"></span>`).join("")}</div>`
        : "";
      fotoHTML=`<img src="${fotos[idx]}" alt="${p.nome}" draggable="false">${extra}`;
    }else{
      fotoHTML=`<div class="placeholder">📷<br>Foto em breve</div>`;
    }
    const cls = (fotos.length>1 && !p.vendido) ? "photo multi" : "photo";
    const faixa = p.vendido ? `<div class="vendido-faixa">VENDIDO ❤</div>` : "";
    const botao = p.vendido
      ? `<button class="add-btn esgotado" disabled>Vendido</button>`
      : `<button class="add-btn ${carrinho.includes(p.id)?"in-cart":""}" onclick="toggleItem(${p.id})">
          ${carrinho.includes(p.id)?"✓ No carrinho":"🛒 Adicionar ao carrinho"}
        </button>`;
    card.innerHTML=`
      <div class="${cls}" data-id="${p.id}">${fotoHTML}${faixa}</div>
      <div class="body">
        <span class="badge">${p.categoria}</span>
        <div class="name">${p.nome}</div>
        ${p.marca?`<div class="marca">${p.marca}</div>`:""}
        <div class="meta">${p.tamanho?`Tam: ${p.tamanho} • `:""}${p.condicao}</div>
        ${p.obs?`<div class="obs">${p.obs}</div>`:""}
        <div class="price">${moeda(p.preco)}</div>
        ${botao}
      </div>`;
    grid.appendChild(card);
  });
  ativarGalerias();
}

/* ---- Galeria de fotos: swipe, setas, bolinhas, fade e ampliar (lightbox) ---- */
const galeriaIdx={};
function ativarGalerias(){
  document.querySelectorAll(".photo[data-id]").forEach(el=>{
    const id=+el.dataset.id;
    const p=PRODUTOS.find(x=>x.id===id);
    const img=el.querySelector("img");
    if(!img || !p.fotos.length) return;
    const total=p.fotos.length;
    let arrastou=false;

    const mostrar=(novo)=>{
      const i=((novo%total)+total)%total;
      galeriaIdx[id]=i;
      const prox=new Image();
      prox.onload=()=>{ img.style.opacity="1"; };
      img.style.opacity="0";
      setTimeout(()=>{ prox.src=p.fotos[i]; img.src=p.fotos[i]; },110);
      const c=el.querySelector(".photo-count"); if(c) c.textContent=(i+1)+"/"+total;
      el.querySelectorAll(".dot").forEach((d,k)=>d.classList.toggle("on",k===i));
    };

    if(total>1){
      // swipe / arrastar para trocar a miniatura
      let x0=null,y0=null;
      el.addEventListener("touchstart",e=>{x0=e.touches[0].clientX;y0=e.touches[0].clientY;arrastou=false;},{passive:true});
      el.addEventListener("touchend",e=>{
        if(x0===null)return;
        const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
        if(Math.abs(dx)>35 && Math.abs(dx)>Math.abs(dy)){arrastou=true;mostrar((galeriaIdx[id]||0)+(dx<0?1:-1));}
        x0=null;
      });
      el.addEventListener("mousedown",e=>{x0=e.clientX;arrastou=false;});
      el.addEventListener("mouseup",e=>{
        if(x0===null)return;
        const dx=e.clientX-x0;
        if(Math.abs(dx)>35){arrastou=true;mostrar((galeriaIdx[id]||0)+(dx<0?1:-1));}
        x0=null;
      });
      el.querySelector(".nav-prev").addEventListener("click",ev=>{ev.stopPropagation();mostrar((galeriaIdx[id]||0)-1);});
      el.querySelector(".nav-next").addEventListener("click",ev=>{ev.stopPropagation();mostrar((galeriaIdx[id]||0)+1);});
      el.querySelectorAll(".dot").forEach((d,k)=>d.addEventListener("click",ev=>{ev.stopPropagation();mostrar(k);}));
    }

    // clique na foto -> ampliar (não abre se foi um arraste/swipe)
    el.style.cursor="zoom-in";
    img.addEventListener("click",()=>{ if(arrastou){arrastou=false;return;} abrirLightbox(id, galeriaIdx[id]||0); });
  });
}

/* ---- Lightbox: foto ampliada com navegação e zoom ---- */
let lbId=null, lbIdx=0;
function abrirLightbox(id,idx){
  lbId=id; lbIdx=idx;
  const p=PRODUTOS.find(x=>x.id===id);
  const img=document.getElementById("lbImg");
  img.className=""; img.style.transform=""; img.src=p.fotos[idx];
  document.getElementById("lbCount").textContent=p.fotos.length>1?(idx+1)+" / "+p.fotos.length:"";
  document.querySelectorAll(".lb-nav").forEach(b=>b.style.display=p.fotos.length>1?"flex":"none");
  document.getElementById("lb").classList.add("open");
  document.body.style.overflow="hidden";
}
function fecharLB(e,force){
  if(force || (e && e.target && e.target.id==="lb")){
    document.getElementById("lb").classList.remove("open");
    document.body.style.overflow="";
  }
}
function lbNav(e,d){
  e.stopPropagation();
  const p=PRODUTOS.find(x=>x.id===lbId);
  lbIdx=((lbIdx+d)%p.fotos.length+p.fotos.length)%p.fotos.length;
  const img=document.getElementById("lbImg");
  img.className=""; img.style.transform=""; img.src=p.fotos[lbIdx];
  document.getElementById("lbCount").textContent=(lbIdx+1)+" / "+p.fotos.length;
}

/* ---- Carrinho ---- */
function toggleItem(id){
  const i=carrinho.indexOf(id);
  if(i>-1) carrinho.splice(i,1); else carrinho.push(id);
  render();        // atualiza o botão do card
  renderCart();    // atualiza o painel
}

function abrirCarrinho(){document.getElementById("cartPanel").classList.add("open");document.getElementById("overlay").classList.add("open");}
function fecharCarrinho(){document.getElementById("cartPanel").classList.remove("open");document.getElementById("overlay").classList.remove("open");}

function renderCart(){
  const itens=carrinho.map(id=>PRODUTOS.find(p=>p.id===id));
  const total=itens.reduce((s,p)=>s+Number(p.preco),0);
  document.getElementById("cartCount").textContent=itens.length;
  document.getElementById("cartTotal").textContent=moeda(total);

  const box=document.getElementById("cartItems");
  if(itens.length===0){
    box.innerHTML='<p class="cart-empty">Seu carrinho está vazio.<br>Adicione os itens que você gostou! 🛍️</p>';
  }else{
    box.innerHTML=itens.map(p=>`
      <div class="cart-row">
        <div class="info">${p.nome}<small>${p.categoria}${p.tamanho?` • tam ${p.tamanho}`:""}</small></div>
        <div class="right">${moeda(p.preco)} <button class="rm" onclick="toggleItem(${p.id})">remover</button></div>
      </div>`).join("");
  }

  // monta a mensagem do WhatsApp com o pedido completo
  let msg="Olá! Gostaria destes itens do Desapegos Casa Família:\n\n";
  itens.forEach((p,n)=>{msg+=`${n+1}. ${p.nome}${p.marca?` - ${p.marca}`:""}${p.tamanho?` (tam ${p.tamanho})`:""} - ${moeda(p.preco)}\n`;});
  msg+=`\nTotal: ${moeda(total)}\n\nAinda estão disponíveis?`;
  document.getElementById("cartSend").href=`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`;
}

render();
renderCart();

/* Lightbox: zoom ao tocar, navegação por teclado e swipe */
(function(){
  const lb=document.getElementById("lb"), img=document.getElementById("lbImg");
  img.addEventListener("click",function(e){
    e.stopPropagation();
    const z=this.classList.toggle("zoom");
    this.style.transform=z?"scale(2)":"";
  });
  let x=null;
  lb.addEventListener("touchstart",e=>{x=e.touches[0].clientX;},{passive:true});
  lb.addEventListener("touchend",e=>{
    if(x===null)return;
    const dx=e.changedTouches[0].clientX-x;
    const p=PRODUTOS.find(q=>q.id===lbId);
    if(Math.abs(dx)>40 && p && p.fotos.length>1) lbNav(e,dx<0?1:-1);
    x=null;
  });
  document.addEventListener("keydown",e=>{
    if(!lb.classList.contains("open"))return;
    if(e.key==="Escape") fecharLB(null,true);
    else if(e.key==="ArrowRight") lbNav(e,1);
    else if(e.key==="ArrowLeft") lbNav(e,-1);
  });
})();
</script>
